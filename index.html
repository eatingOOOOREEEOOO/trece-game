// Sequential reveal: show each rank-3 card one by one (suit low→high),
// then a final "X mulai!" popup. Each step waits for the previous to finish.
function showThreeRevealSequence(allThrees,startName,isMe,onDone){
  const el=document.getElementById('posAnnounce');
  const SUIT_SYM=['♦','♣','♥','♠'];
  const SUIT_COL=['#e03040','#aaccff','#e03040','#aaccff']; // r/b/r/b

  // Build step list: one entry per card (sorted suit low→high, already sorted)
  // Then a final step: first-player announcement
  const steps=[];

  allThrees.forEach((c,idx)=>{
    const ownerName=c._ownerName||'';
    const sym=SUIT_SYM[c.suit];
    const col=SUIT_COL[c.suit];
    const isLast=idx===allThrees.length-1;
    steps.push({
      html:[
        '<div style="font-size:9px;letter-spacing:3px;color:rgba(0,255,136,0.4);margin-bottom:10px">KARTU 3 DITEMUKAN ('+(idx+1)+'/'+allThrees.length+')</div>',
        '<div style="font-size:36px;margin-bottom:8px">',
          '<span style="font-family:serif;color:'+col+';text-shadow:0 0 18px '+col+'88">3'+sym+'</span>',
        '</div>',
        '<div style="font-size:13px;color:#f0c85a;font-weight:700;margin-bottom:4px">'+ownerName+'</div>',
        isLast
          ? '<div style="font-size:9px;color:rgba(0,255,136,0.5);letter-spacing:2px;margin-top:6px">kartu tertinggi — menentukan giliran</div>'
          : '<div style="font-size:9px;color:rgba(255,255,255,0.25);letter-spacing:1px;margin-top:6px">kartu ini dikeluarkan dari tangan</div>'
      ].join(''),
      dur: isLast ? 2000 : 1600
    });
  });

  // Final step: first player announcement
  steps.push({
    html:[
      '<div style="font-size:9px;letter-spacing:3px;color:rgba(0,255,136,0.45);margin-bottom:14px">GILIRAN PERTAMA</div>',
      '<div style="font-size:'+(isMe?'28':'22')+'px;font-weight:700;color:'+(isMe?'#00ff88':'#f0c85a')+';margin-bottom:10px">',
        isMe?'🎯 Kamu mulai!':'⭐ '+startName+' mulai!',
      '</div>',
      '<div style="font-size:10px;color:rgba(255,255,255,0.3);letter-spacing:1px">Meja reset — bebas pilih kombinasi apa saja</div>'
    ].join(''),
    dur: 2200
  });

  let stepIdx=0;
  function runStep(){
    if(stepIdx>=steps.length){onDone();return;}
    const step=steps[stepIdx++];
    const div=document.createElement('div');
    Object.assign(div.style,{
      background:'rgba(6,13,16,0.97)',
      border:'2px solid rgba(0,255,136,0.45)',
      borderRadius:'18px',
      padding:'22px 32px',
      textAlign:'center',
      fontFamily:'JetBrains Mono,monospace',
      animation:'posIn 0.4s cubic-bezier(0.34,1.4,0.64,1) both',
      maxWidth:'300px',
      boxShadow:'0 0 40px rgba(0,255,136,0.08)'
    });
    div.innerHTML=step.html;
    el.innerHTML='';
    el.appendChild(div);
    setTimeout(()=>{
      div.style.animation='posOut 0.35s ease-in forwards';
      setTimeout(()=>{div.remove();runStep();},350);
    },step.dur);
  }
  runStep();
}

// ══ TURN FLOW ══
function proceedTurn(){
  if(!G||G.phase==='end')return;

  // ── BID PHASE ──
  if(G.phase==='bid'){
    proceedBidTurn();
    return;
  }

  const cur=G.current;
  const pl=G.players[cur];

  clearTimer();

  // If current player has already finished, advance
  if(G.finished.includes(cur)){advanceTurn();return;}

  if(pl.isBot){
    // Only host drives bot turns
    if(isHost){
      const delay=850+Math.random()*350;
      setTimeout(()=>doBotTurn(cur),delay);
    }
    // Non-host just waits for state update
  }else if(pl.id===myId){
    if(G.finished.includes(G.mySlot)){
      setGStat('Kamu sudah selesai! Menunggu pemain lain...');
      renderGame();
      return;
    }
    setGStat('Giliran KAMU!');
    SFX.yourTurn();
    renderGame();
    startTimer(()=>{
      setGStat('Waktu habis — otomatis main kartu terkecil!');
      if(G.currentCombo){
        playerSkip();
      }else{
        // Must play something — auto-play lowest card
        const hand=G.hands[G.mySlot];
        if(hand&&hand.length>0){
          const lowest=srtH(hand)[0];
          const combo={type:'single',rank:crank(lowest),cards:[lowest],len:1};
          G.selected=[];
          clearTimer();
          SFX.cardPlay();
          if(isHost){
            applyPlay(G.mySlot,combo);
          }else{
            send({type:'game_action',action:'play',pid:myId,
              combo:{type:combo.type,rank:combo.rank,len:combo.len,cards:combo.cards}});
          }
        }
      }
    });
  }else{
    setGStat(`Menunggu ${pl.name}...`);
    renderGame();
  }
}

// ── BID PHASE LOGIC ──
function proceedBidTurn(){
  if(!G||G.phase!=='bid')return;
  const cur=G.current;
  const pl=G.players[cur];
  clearTimer();

  // HOST drives all bid logic (bots + auto-skips + waiting for non-host actions)
  if(isHost){
    const myThrees=G.hands[cur].filter(c=>c.val===3);
    if(!myThrees.length){
      // No 3s — auto-skip
      setTimeout(()=>applyBid(cur,null),400);
      return;
    }
    if(pl.isBot){
      setTimeout(()=>{
        const combo=detectCombo(myThrees)||{type:'single',rank:0,cards:[myThrees[0]],len:1};
        applyBid(cur,combo);
      },900+Math.random()*400);
    }else if(pl.id===myId){
      // Host is this player
      setGStat('Fase BID: mainkan kartu 3 kamu!');
      SFX.yourTurn();
      renderGame();
      startTimer(()=>{
        const threes=G.hands[G.mySlot].filter(c=>c.val===3);
        const combo=threes.length?(detectCombo(threes)||{type:'single',rank:0,cards:[threes[0]],len:1}):null;
        applyBid(G.mySlot,combo);
      });
    }else{
      // Waiting for non-host player to send bid action
      setGStat(`Menunggu ${pl.name} bid...`);
      renderGame();
    }
  }else{
    // NON-HOST: player bisa bid kapan saja, tidak perlu nunggu giliran resmi
    // Hanya update UI — player sudah bisa pilih dan klik MAIN kapan saja
    const ms=G.mySlot;
    const myBidDone=G.bidDone&&G.bidDone[ms];

    if(myBidDone){
      // Sudah bid, tunggu yang lain
      setGStat(`Menunggu pemain lain bid... (${G.bidDone.filter(Boolean).length}/4)`);
      renderGame();
      return;
    }

    const myThrees=G.hands[ms].filter(c=>c.val===3);
    if(!myThrees.length){
      // Tidak punya kartu 3 — auto-skip langsung
      setTimeout(()=>{
        if(G&&G.phase==='bid'&&!G.bidDone[G.mySlot]){
          G.bidDone[G.mySlot]=true; // mark locally
          send({type:'game_action',action:'bid',pid:myId,combo:null});
          setGStat(`Menunggu pemain lain bid... (${G.bidDone.filter(Boolean).length}/4)`);
          renderGame();
        }
      },400);
      setGStat('Kamu tidak punya kartu 3 — skip otomatis');
      renderGame();
    }else{
      // Punya kartu 3 — minta player pilih dan klik MAIN
      // Tampilkan pesan berbeda tergantung apakah giliran resmi atau belum
      if(cur===ms){
        setGStat('⭐ Giliran kamu BID! Pilih kartu 3 dan tekan MAIN');
        SFX.yourTurn();
      }else{
        setGStat('Fase BID: pilih kartu 3 kamu dan tekan MAIN kapan saja!');
      }
      renderGame();
      // Jika ini giliran resminya, mulai timer
      if(cur===ms){
        startTimer(()=>{
          if(G&&G.phase==='bid'&&!G.bidDone[G.mySlot]){
            const threes=G.hands[G.mySlot].filter(c=>c.val===3);
            const combo=threes.length?(detectCombo(threes)||{type:'single',rank:0,cards:[threes[0]],len:1}):null;
            G.bidDone[G.mySlot]=true;
            if(combo){
              const ids=new Set(combo.cards.map(c=>c.id));
              G.hands[G.mySlot]=G.hands[G.mySlot].filter(c=>!ids.has(c.id));
              feltStackedCards.push({cards:combo.cards,playerName:G.players[G.mySlot].name,isMyPlay:true});
              renderGame();
              send({type:'game_action',action:'bid',pid:myId,
                combo:{type:combo.type,rank:combo.rank||0,len:combo.len,cards:combo.cards}});
            }else{
              send({type:'game_action',action:'bid',pid:myId,combo:null});
            }
          }
          clearTimer();
        });
      }
    }
  }
}

function applyBid(pidx,combo){
  if(!G||G.phase!=='bid')return;
  if(G.bidDone[pidx])return;
  // Only host (or self for local UI) should run this
  // Non-host must NOT call this for other players — state comes via receiveState
  if(!isHost&&pidx!==G.mySlot)return;
  G.bidDone[pidx]=true;

  if(combo){
    // Remove bid cards from hand, record play
    const ids=new Set(combo.cards.map(c=>c.id));
    G.hands[pidx]=G.hands[pidx].filter(c=>!ids.has(c.id));
    G.bidPlays.push({pidx,cards:combo.cards});
    // Place on felt
    feltStackedCards.push({cards:combo.cards,playerName:G.players[pidx].name,isMyPlay:pidx===G.mySlot});
    setGStat(`${G.players[pidx].name} memainkan kartu 3`);
    SFX.cardPlay();
  }else{
    setGStat(`${G.players[pidx].name} tidak punya kartu 3 — skip`);
  }

  if(isHost){
    bcastState();
    // Check if all 4 players have bid
    if(G.bidDone.every(Boolean)){
      setTimeout(()=>finishBidPhase(),600);
      return;
    }
    // Advance to next player who hasn't bid
    let next=(pidx+1)%4;
    let tries=0;
    while(G.bidDone[next]&&tries<4){next=(next+1)%4;tries++;}
    G.current=next;
    renderGame();
    proceedTurn();
  }else{
    // Non-host: just update local UI; wait for host state update to drive next turn
    renderGame();
  }
}

function finishBidPhase(){
  if(!G)return;
  // Determine startP: player who played the highest-suit 3
  // bidPlays contains {pidx, cards[]}
  let startP=0,highestSuit=-1,topCard=null;
  const allThrees=[];
  for(const bp of G.bidPlays){
    for(const c of bp.cards){
      allThrees.push(Object.assign({},c,{_owner:bp.pidx,_ownerName:G.players[bp.pidx].name}));
      if(c.suit>highestSuit){highestSuit=c.suit;startP=bp.pidx;topCard=c;}
    }
  }
  // If nobody played any 3 (edge case), start from player 0
  if(highestSuit===-1)startP=0;

  // Reset to play phase
  G.phase='play';
  G.current=startP;
  G.currentCombo=null;
  G.prevCombo=null;
  G.lastPlayedBy=-1;
  G.skipped=[false,false,false,false];
  // Reset felt — clear 3s for fresh start
  feltStackedCards=[];
  // Broadcast final bid result (startP) to all clients BEFORE popup
  if(isHost)bcastState();

  // Show sequential reveal then start game
  const isMe=startP===G.mySlot;
  const nm=G.players[startP].name;
  allThrees.sort((a,b)=>a.suit-b.suit);
  renderGame();
  showThreeRevealSequence(allThrees,nm,isMe,()=>{
    proceedTurn();
  });
}

function doBotTurn(pidx){
  if(!isHost||!G||G.phase==='end'||G.current!==pidx)return;
  const play=botDecide(G.hands[pidx],G.currentCombo,false,null,G,pidx);
  if(play&&comboBeats(G.currentCombo,play)){
    applyPlay(pidx,play);
  }else{
    applySkip(pidx);
  }
}

function isPokerCombo(combo){
  if(!combo)return false;
  if(combo.type==='single'||combo.type==='double'||combo.type==='triple'){
    return combo.cards.every(c=>c.val===2);
  }
  return false;
}

function triggerPokerBombEnd(pokerIdx,bombIdx,bombCombo){
  G.phase='end';
  clearTimer();
  feltStackedCards.push({cards:bombCombo.cards,playerName:G.players[bombIdx].name,isMyPlay:bombIdx===G.mySlot});
  const bombNm=G.players[bombIdx].name;
  const pokerNm=G.players[pokerIdx].name;
  SFX.pokerBombed();
  showNotif(`💣 ${bombNm} BOMB! ${pokerNm} LANGSUNG KALAH!`,true);
  setGStat(`💣 ${bombNm} melawan Poker dengan Bomb! ${pokerNm} kalah!`);
  // Rank 1: Bomb player; Rank 4: Poker player; Rank 2&3: remaining by fewest cards
  const others=[0,1,2,3].filter(p=>p!==bombIdx&&p!==pokerIdx&&!G.finished.includes(p));
  others.sort((a,b)=>G.hands[a].length-G.hands[b].length);
  G.finished=[bombIdx,...others,pokerIdx];
  // Queue all position announcements — they show sequentially via the queue
  G.finished.forEach((p,rank)=>{
    showPositionAnnounce(rank,G.players[p].name,p===G.mySlot);
  });
  if(G.finished[0]===G.mySlot)showWinCelebration();
  if(isHost)bcastState();
  renderGame();
  // Show end modal only after all position popups have finished
  setTimeout(showEndModal, posQueueRemainingMs());
}

function applyPlay(pidx,combo){
  // Remove played cards from hand
  const ids=new Set(combo.cards.map(c=>c.id));
  G.hands[pidx]=G.hands[pidx].filter(c=>!ids.has(c.id));

  // POKER vs BOMB: jika combo sebelumnya adalah Poker (angka 2) dan sekarang Bomb
  const prevWasPoker=G.currentCombo&&isPokerCombo(G.currentCombo);
  const curIsBomb=isBomb(combo);
  if(prevWasPoker&&curIsBomb){
    triggerPokerBombEnd(G.lastPlayedBy,pidx,combo);
    return;
  }

  G.prevCombo=G.currentCombo;
  G.currentCombo=combo;
  G.lastPlayedBy=pidx;
  G.skipped=[false,false,false,false];

  // Push to stacked cards (accumulate within a round)
  feltStackedCards.push({cards:combo.cards,playerName:G.players[pidx].name,isMyPlay:pidx===G.mySlot});

  const nm=G.players[pidx].name;
  if(G.hands[pidx].length===0){
    const rank=G.finished.length;
    G.finished.push(pidx);
    setGStat(`🎉 ${nm} selesai! Posisi #${G.finished.length}`);
    showNotif(`🎉 ${nm} selesai!`);
    showPositionAnnounce(rank,nm,pidx===G.mySlot);
    SFX.playerFinish();
  }else{
    setGStat(`${nm} mainkan ${comboLabel(combo)}`);
    if(isBomb(combo)){showNotif(`💣 ${nm}: ${comboLabel(combo)}!`,true);SFX.bomb();}
  }

  checkEnd();
  if(G.phase!=='end')advanceTurn();
  if(isHost)bcastState();
  renderGame();
}

function applySkip(pidx){
  G.skipped[pidx]=true;
  setGStat(`${G.players[pidx].name} skip`);

  // Check if all OTHER active players (not lastPlayedBy) have skipped
  const active=[0,1,2,3].filter(p=>!G.finished.includes(p)&&p!==G.lastPlayedBy);
  const allSkipped=active.length>0&&active.every(p=>G.skipped[p]);

  if(allSkipped&&G.lastPlayedBy>=0){
    // Round over — lastPlayedBy leads again, clear the felt stack
    G.prevCombo=null;
    G.currentCombo=null;
    G.skipped=[false,false,false,false];
    G.current=G.lastPlayedBy;
    G.lastPlayedBy=-1;
    feltStackedCards=[]; // clear stacked cards for new round
    lastComboId='_clear_'; // force re-render
    SFX.newRound();
    setGStat(`${G.players[G.current].name} berhak main lagi!`);
    if(isHost)bcastState();
    renderGame();
    proceedTurn();
    return;
  }
  advanceTurn();
  if(isHost)bcastState();
  renderGame();
}

function advanceTurn(){
  if(G.phase==='end'||G.phase==='bid')return;
  let next=(G.current+1)%4,tries=0;
  while(G.finished.includes(next)&&tries<4){next=(next+1)%4;tries++;}
  if(G.finished.includes(next))return; // everyone done
  G.current=next;
  proceedTurn();
}

function showWinCelebration(){
  // Win popup removed — handled by position announce queue instead
  SFX.win();
}

function checkEnd(){
  const rem=[0,1,2,3].filter(p=>!G.finished.includes(p));
  if(rem.length<=1){
    G.phase='end';
    clearTimer();
    if(rem.length===1){
      const lastP=rem[0];
      const rank=G.finished.length;
      G.finished.push(lastP);
      showPositionAnnounce(rank,G.players[lastP].name,lastP===G.mySlot);
    }
    // Re-sort queue: local player's popup shows first, then others in rank order
    _posQueue.sort((a,b)=>{
      if(a.isMe&&!b.isMe)return-1;
      if(!a.isMe&&b.isMe)return 1;
      return a.rank-b.rank;
    });
    // Show win celebration if local player is the winner
    if(G.finished.length>0&&G.finished[0]===G.mySlot){
      showWinCelebration();
    }else{
      SFX.lose();
    }
    if(isHost)bcastState();
    // Wait for all position announce popups to finish before showing end modal
    setTimeout(showEndModal, posQueueRemainingMs());
  }
}

function bcastState(){
  if(!isHost)return;
  const stateWithStack=JSON.parse(JSON.stringify(G));
  stateWithStack._feltStack=feltStackedCards;
  send({type:'game_state',state:stateWithStack});
}

// Track bid→play transition to prevent double popup on non-host
let _bidTransitionShown = false;

function receiveState(state){
  const ms=G?G.mySlot:0;
  // Sync felt stack from host
  if(state._feltStack!==undefined){
    feltStackedCards=state._feltStack;
    delete state._feltStack;
  }

  // ── Preserve local hand order ──
  const localHand = G ? [...(G.hands[ms]||[])] : null;

  const wasEnd=G&&G.phase==='end';
  const wasBid=G&&G.phase==='bid';
  G=state;
  G.mySlot=ms;
  G.selected=G.selected||[];
  G.bidDone=G.bidDone||[false,false,false,false];
  G.bidPlays=G.bidPlays||[];

  // Restore local order: keep only cards still present in host's authoritative hand
  if(localHand){
    const hostHandIds=new Set((G.hands[ms]||[]).map(c=>c.id));
    const preserved=localHand.filter(c=>hostHandIds.has(c.id));
    const preservedIds=new Set(preserved.map(c=>c.id));
    const extra=(G.hands[ms]||[]).filter(c=>!preservedIds.has(c.id));
    G.hands[ms]=[...preserved,...extra];
  }

  lastComboId=''; // force felt re-render with synced stack
  renderGame();

  const isBidToPlayTransition = wasBid && G.phase==='play';

  if(G.phase==='end'){
    if(!wasEnd){
      if(G.finished.length>0&&G.finished[0]===G.mySlot){
        showWinCelebration();
      }
      setTimeout(showEndModal, posQueueRemainingMs());
    }
  }else if(G.phase==='bid'){
    // Bid phase: update UI. Player bisa bid kapan saja (tidak tergantung G.current)
    if(!G.bidDone[G.mySlot]){
      // Belum bid — panggil proceedBidTurn untuk update UI dan timer jika perlu
      proceedBidTurn();
    }else{
      setGStat(`Menunggu pemain lain bid... (${G.bidDone.filter(Boolean).length}/4)`);
      renderGame();
    }
  }else if(isBidToPlayTransition&&!_bidTransitionShown){
    // Bid phase just ended — show reveal sequence then start play (only once)
    _bidTransitionShown=true;
    const allThrees=[];
    for(const bp of G.bidPlays){
      for(const c of bp.cards){
        allThrees.push(Object.assign({},c,{_owner:bp.pidx,_ownerName:G.players[bp.pidx].name}));
      }
    }
    allThrees.sort((a,b)=>a.suit-b.suit);
    const startP=G.current;
    const isMe=startP===ms;
    const nm=G.players[startP].name;
    clearTimer();
    showThreeRevealSequence(allThrees,nm,isMe,()=>{
      _bidTransitionShown=false;
      proceedTurn();
    });
  }else{
    proceedTurn();
  }
}

// ══ PLAYER ACTIONS ══
function playerPlay(){
  if(!G||G.phase==='end')return;
  // Bid phase: boleh submit kapan saja (tidak perlu nunggu giliran)
  // Play phase: harus giliran sendiri
  if(G.phase!=='bid'&&G.current!==G.mySlot)return;
  const hand=G.hands[G.mySlot];
  const selCards=(G.selected||[]).map(i=>hand[i]);

  // ── BID PHASE: hanya kartu 3 yang boleh dimainkan ──
  if(G.phase==='bid'){
    if(!selCards.length)return;
    if(selCards.some(c=>c.val!==3)){
      showNotif('Fase BID: hanya kartu 3 yang boleh dimainkan!');
      return;
    }
    if(G.bidDone[G.mySlot])return; // already bid
    const combo=detectCombo(selCards)||{type:'single',rank:0,cards:selCards,len:selCards.length};
    G.selected=[];
    clearTimer();
    SFX.cardPlay();
    if(isHost){
      applyBid(G.mySlot,combo);
    }else{
      // Mark locally to prevent double-submit (host will confirm via state)
      G.bidDone[G.mySlot]=true;
      // Remove bid cards from local hand for immediate visual feedback
      const ids=new Set(combo.cards.map(c=>c.id));
      G.hands[G.mySlot]=G.hands[G.mySlot].filter(c=>!ids.has(c.id));
      feltStackedCards.push({cards:combo.cards,playerName:G.players[G.mySlot].name,isMyPlay:true});
      renderGame();
      setGStat('Kartu 3 dimainkan — menunggu pemain lain...');
      send({type:'game_action',action:'bid',pid:myId,
        combo:{type:combo.type,rank:combo.rank||0,len:combo.len,cards:combo.cards}});
    }
    return;
  }

  const combo=detectCombo(selCards);
  if(!combo||!comboBeats(G.currentCombo,combo))return;

  G.selected=[];
  clearTimer();
  SFX.cardPlay();
  if(isHost){
    applyPlay(G.mySlot,combo);
  }else{
    send({type:'game_action',action:'play',pid:myId,
      combo:{type:combo.type,rank:combo.rank,len:combo.len,cards:combo.cards}});
  }
}

function playerSkip(){
  if(!G||G.phase==='end'||G.current!==G.mySlot)return;
  if(!G.currentCombo)return; // meja kosong — harus main sesuatu
  G.selected=[];
  clearTimer();
  SFX.skip();
  if(isHost){
    applySkip(G.mySlot);
  }else{
    send({type:'game_action',action:'skip',pid:myId});
  }
}

function hostReceiveAction(d){
  if(!isHost)return;
  const pidx=G.players.findIndex(p=>p.id===d.pid);
  if(pidx<0||pidx!==G.current)return;
  if(G.phase==='bid'){
    if(d.action==='bid'){
      // Validate: all cards must be rank 3
      if(d.combo&&d.combo.cards&&d.combo.cards.some(c=>c.val!==3))return;
      // Guard: must be this player's turn and not already bid
      if(G.bidDone[pidx])return;
      if(G.current!==pidx)return;
      applyBid(pidx,d.combo||null);
    }
    return;
  }
  if(d.action==='play'){
    if(comboBeats(G.currentCombo,d.combo)){
      if(G.firstTurn)G.firstTurn=false;
      applyPlay(pidx,d.combo);
    }
  }else if(d.action==='skip'){
    applySkip(pidx);
  }
}

// ══ RENDER ══
const sc=s=>(s===0||s===2)?'r':'b';
const vd=v=>String(v);

function mkCardHTML(c,idx,selectable,selected,dimmed=false){
  const col=sc(c.suit),sym=SUITS[c.suit],v=vd(c.val);
  const selCls=selected?'sel':'';
  const nhCls=(!selectable||dimmed)?'nh':'';
  const dimStyle=dimmed?'opacity:0.35;filter:grayscale(0.6);':'';
  const fcCls=''; // no firstCard highlight
  const click=selectable&&!dimmed?`onclick="toggleCard(${idx})"` :'';
  // On mobile: selected cards get higher z-index so they pop above neighbors
  const zStyle=selected?`style="z-index:${50+idx};${dimStyle}"`:`style="z-index:${idx+1};${dimStyle}"`;
  return `<div class="card ${col} ${selCls} ${nhCls} ${fcCls}" ${click} ${zStyle}
    draggable="true"
    data-idx="${idx}"
    ondragstart="handleCardDragStart(event,${idx})"
    ondragover="handleCardDragOver(event,${idx})"
    ondragend="handleCardDragEnd(event)"
    ondrop="handleCardDrop(event,${idx})"
    title="${v}${sym}">
    <div class="ct"><span class="cv">${v}</span><span class="cs">${sym}</span></div>
    <span class="cc">${sym}</span>
    <div class="cb2"><span class="cv">${v}</span><span class="cs">${sym}</span></div>
  </div>`;
}

function mkGhostHTML(c){
  const col=sc(c.suit),sym=SUITS[c.suit],v=vd(c.val);
  return `<div class="ghost-card ${col}">
    <div class="ct"><span class="cv">${v}</span><span class="cs">${sym}</span></div>
    <span class="cc">${sym}</span>
    <div class="cb2"><span class="cv">${v}</span><span class="cs">${sym}</span></div>
  </div>`;
}

let lastComboId='';

function renderFeltCards(cards){
  const fc=document.getElementById('feltCards');
  const badge=document.getElementById('comboBadge');

  // Empty table
  if(!feltStackedCards||!feltStackedCards.length){
    const emptyMsg=G&&G.phase==='bid'?'Fase BID — mainkan kartu 3 untuk menentukan giliran pertama':'Meja kosong — bebas memulai';
    fc.innerHTML=`<div class="empty-msg">${emptyMsg}</div>`;
    badge.style.display='none';
    return;
  }

  fc.innerHTML='';

  // Always render ALL plays stacked on top of each other at center.
  // Earlier plays sit underneath (lower z-index), latest play on top.
  // Each play fans its own cards slightly — NO opacity, NO side-by-side.
  let globalZ=1;
  feltStackedCards.forEach((play, stackIdx)=>{
    const isLatest = stackIdx === feltStackedCards.length - 1;
    const n = play.cards.length;

    // Fan spread for this play's cards
    const spread = Math.min(160, n * 32);
    const step = n > 1 ? spread / (n - 1) : 0;
    const startX = -(spread / 2);

    // Each older play is rotated slightly differently so they peek out
    const baseRot = (stackIdx % 2 === 0 ? 1 : -1) * (stackIdx * 2.5);

    play.cards.forEach((c, i)=>{
      const col = sc(c.suit), sym = SUITS[c.suit], v = vd(c.val);
      const x = n > 1 ? startX + i * step : 0;
      const rot = baseRot + (i - (n - 1) / 2) * 2.2;
      const yOff = Math.abs(i - (n - 1) / 2) * 1.5;

      const div = document.createElement('div');
      div.className = 'felt-stack-card' + (isLatest ? ' animate' : '');
      // No opacity, no scale difference — just z-index layering
      div.style.cssText = [
        `--sf:translateX(${x}px) translateY(${yOff+55}px) rotate(${rot*2}deg)`,
        `--st:translateX(${x}px) translateY(${yOff}px) rotate(${rot}deg)`,
        `animation-delay:${i*50}ms`,
        `z-index:${globalZ++}`
      ].join(';') + ';';

      div.innerHTML = `<div class="card ${col} nh">
        <div class="ct"><span class="cv">${v}</span><span class="cs">${sym}</span></div>
        <span class="cc">${sym}</span>
        <div class="cb2"><span class="cv">${v}</span><span class="cs">${sym}</span></div>
      </div>`;
      fc.appendChild(div);
    });
  });

  // Badge shows current combo label
  if(cards && cards.length){
    badge.style.display = 'block';
    const curCombo = G && G.currentCombo;
    badge.textContent = comboLabel(curCombo) || '';
    badge.className = isBomb(curCombo) ? 'bomb' : '';
    badge.id = 'comboBadge';
  } else {
    badge.style.display = 'none';
  }
}

function renderGame(){
  if(!G)return;
  const ms=G.mySlot;
  const isMyTurn=G.current===ms;

  // ── Opponents (the 3 others) ──
  const others=[0,1,2,3].filter(i=>i!==ms);
  document.getElementById('oppBar').innerHTML=others.map(pidx=>{
    const p=G.players[pidx],hand=G.hands[pidx];
    const active=G.current===pidx,done=G.finished.includes(pidx);
    const finRank=G.finished.indexOf(pidx);
    const medals=['🥇','🥈','🥉','💀'];
    const badge=done?medals[Math.min(finRank,3)]:(active?'▶':'');
    return `<div class="opp${active?' my-go':''}${done?' done':''}">
      <div class="opp-nm">${badge} ${p.name} (${hand.length})</div>
      <div class="opp-backs">${hand.slice(0,16).map(()=>'<div class="cback"></div>').join('')}</div>
    </div>`;
  }).join('');

  // ── Turn dots (all 4) ──
  document.getElementById('tdots').innerHTML=[0,1,2,3].map(i=>{
    const a=G.current===i,d=G.finished.includes(i);
    return `<div class="tdot${a?' on':''}${d?' dn':''}">
      <div class="tdot-pip"></div>
      <span>${G.players[i].name.split(' ')[0]}</span>
    </div>`;
  }).join('');

  // ── Felt (re-render if combo changed or stack changed) ──
  const cid=(G.currentCombo?G.currentCombo.cards.map(c=>c.id).join(','):'')+'|'+feltStackedCards.length;
  if(cid!==lastComboId){
    lastComboId=cid;
    renderFeltCards(G.currentCombo?G.currentCombo.cards:null);
  }

  // ── Ghost row ──
  const gr=document.getElementById('ghostRow');
  gr.querySelectorAll('.ghost-card').forEach(el=>el.remove());
  if(G.prevCombo&&G.prevCombo.cards&&G.currentCombo){
    G.prevCombo.cards.forEach(c=>gr.insertAdjacentHTML('beforeend',mkGhostHTML(c)));
    gr.classList.add('vis');
  }else gr.classList.remove('vis');

  // ── Player hand ──
  const hand=G.hands[ms]||[];
  const isBidPhase=G.phase==='bid';
  // Bid phase: player dapat memilih kartu 3 kapan saja selama belum bid
  const myBidDone=isBidPhase&&G.bidDone&&G.bidDone[ms];
  const canSelectBid=isBidPhase&&!myBidDone;
  const canSelect=(isMyTurn&&G.phase!=='end')||canSelectBid;

  // During bid phase: cards that are NOT rank-3 get dimmed (nh = not-hoverable)
  document.getElementById('handInner').innerHTML=
    hand.map((c,i)=>{
      const isBidBlocked=isBidPhase&&c.val!==3;
      const sel=G.selected&&G.selected.includes(i);
      return mkCardHTML(c,i,canSelect&&!isBidBlocked,sel,isBidBlocked);
    }).join('');

  // ── Nameplate ──
  const np=document.getElementById('myplate');
  const bidStatus=isBidPhase?` — FASE BID (${G.bidDone.filter(Boolean).length}/4)`:'';
  np.textContent=`${G.players[ms].name} — ${hand.length} kartu${isMyTurn?' ◀ GILIRAN KAMU':''}${bidStatus}`;
  np.className=isMyTurn?'on':'';

  // ── Buttons ──
  const gameOver=G.phase==='end';
  document.getElementById('btnPlay').disabled=true;
  const canSkip=!gameOver&&isMyTurn&&(!!G.currentCombo)&&!isBidPhase;
  document.getElementById('btnSkip').disabled=!canSkip;

  if(!gameOver&&(isMyTurn||canSelectBid))updateComboHint();
  else{
    document.getElementById('comboHint').textContent='';
    document.getElementById('comboHint').style.color='rgba(212,168,67,0.35)';
  }
}

function toggleCard(idx){
  if(!G||G.phase==='end')return;
  if(!G.selected)G.selected=[];
  const hand=G.hands[G.mySlot]||[];
  const card=hand[idx];
  const ms=G.mySlot;

  if(G.phase==='bid'){
    // Bid phase: boleh pilih kartu 3 kapan saja, ASALKAN belum bid
    if(G.bidDone&&G.bidDone[ms])return; // sudah bid, tidak bisa pilih lagi
    if(!card||card.val!==3){
      showNotif('Fase BID: hanya kartu 3 yang boleh dipilih!');
      return;
    }
    // boleh pilih kartu 3 kapan saja (tidak perlu giliran)
  }else{
    // Play phase: harus giliran sendiri
    if(G.current!==ms)return;
  }

  const i=G.selected.indexOf(idx);
  if(i>=0){G.selected.splice(i,1);SFX.cardDeselect();}else{G.selected.push(idx);SFX.cardSelect();}
  document.getElementById('handInner').innerHTML=
    hand.map((c,i)=>mkCardHTML(c,i,true,G.selected.includes(i))).join('');
  updateComboHint();
}

function updateComboHint(){
  const hint=document.getElementById('comboHint');
  const btnPlay=document.getElementById('btnPlay');

  // ── BID PHASE hint ──
  if(G.phase==='bid'){
    const ms=G.mySlot;
    // Jika sudah bid, disable semua
    if(G.bidDone&&G.bidDone[ms]){
      hint.textContent='Kartu 3 sudah dimainkan — menunggu pemain lain...';
      hint.style.color='rgba(0,255,136,0.35)';
      btnPlay.disabled=true;return;
    }
    const hand=G.hands[ms]||[];
    const myThrees=hand.filter(c=>c.val===3);
    if(!myThrees.length){
      hint.textContent='Kamu tidak punya kartu 3 — skip otomatis';
      hint.style.color='rgba(255,255,255,0.3)';
      btnPlay.disabled=true;return;
    }
    if(!G.selected||!G.selected.length){
      hint.textContent='Pilih kartu 3 untuk dimainkan di fase BID';
      hint.style.color='rgba(212,168,67,0.45)';
      btnPlay.disabled=true;return;
    }
    const sel=G.selected.map(i=>hand[i]).filter(Boolean);
    if(sel.some(c=>c.val!==3)){
      hint.textContent='Hanya kartu 3 yang boleh dimainkan!';
      hint.style.color='#e03040';btnPlay.disabled=true;return;
    }
    hint.textContent='✓ Mainkan kartu 3 sekarang!';
    hint.style.color='#00e8ff';
    btnPlay.disabled=false;
    return;
  }

  if(!G.selected||!G.selected.length){
    hint.textContent=G.firstTurn&&G.firstCard
      ?`Mainkan 3 ${SUIT_NAMES[G.firstCard.suit]} terlebih dulu (berkilau emas)`
      :'Pilih kartu untuk dimainkan';
    hint.style.color='rgba(212,168,67,0.35)';
    btnPlay.disabled=true;return;
  }
  const hand=G.hands[G.mySlot]||[];
  const sel=G.selected.map(i=>hand[i]);
  const combo=detectCombo(sel);
  if(!combo){
    hint.textContent='Kombinasi tidak valid';hint.style.color='#e03040';btnPlay.disabled=true;
  }else if(!comboBeats(G.currentCombo,combo)){
    hint.textContent=`${comboLabel(combo)} — terlalu kecil`;hint.style.color='#e03040';btnPlay.disabled=true;
  }else{
    hint.textContent=`✓ ${comboLabel(combo)} — siap dimainkan!`;
    hint.style.color=isBomb(combo)?'#cc44ff':'#00e8ff';
    btnPlay.disabled=false;
  }
}

function setGStat(m){const el=document.getElementById('gstat');if(el)el.textContent=m;}

function showNotif(msg,bomb=false){
  const n=document.getElementById('notif');
  const pill=document.createElement('div');
  pill.className='npill'+(bomb?' bomb':'');
  pill.textContent=msg;
  n.appendChild(pill);
  setTimeout(()=>pill.remove(),2300);
}

function showEndModal(){
  if(!G)return;
  const medals=['🥇','🥈','🥉','💀'];
  const clrs=['#d4a843','#aaaaaa','#cd7f32','#8b1a1a'];
  const ms=G.mySlot;
  const items=G.finished.map((pidx,rank)=>`
    <li class="ritem" style="animation-delay:${rank*0.08}s">
      <div class="rcircle" style="background:${clrs[rank]}18;color:${clrs[rank]};border:1px solid ${clrs[rank]}44">${medals[rank]}</div>
      <span style="color:${pidx===ms?'var(--neon)':'var(--gold3)'};flex:1">${G.players[pidx].name}${pidx===ms?' (Kamu)':''}</span>
      <span style="font-size:9px;font-family:'JetBrains Mono';color:rgba(212,168,67,0.4)">${rank===0?'MENANG':rank===3?'KALAH':'#'+(rank+1)}</span>
    </li>`).join('');

  // Host broadcasts play_again signal; non-host just returns
  const mainLagiAction = isHost
    ? `hostInitPlayAgain()`
    : `returnToLobby()`;

  document.getElementById('endModal').innerHTML=`<div class="overlay"><div class="modal">
    <div class="modal-t">${G.finished[0]===ms?'🎉 MENANG!':'GAME SELESAI'}</div>
    <ul class="rlist">${items}</ul>
    <button class="btn btn-gold" style="font-family:'Cinzel Decorative';font-size:12px;" onclick="${mainLagiAction}">MAIN LAGI</button>
  </div></div>`;
}

function hostInitPlayAgain(){
  // Reset ready state
  readyPlayers=new Set();
  myReady=false;
  gameHasStarted=true;
  // Tell all players to return to lobby
  const realPlayers=lobbyPlayers.filter(p=>!p.isBot);
  send({type:'play_again',realPlayers,readyIds:[]});
  returnToLobby();
}

// ══ BACKGROUND CANVAS ══
function startBgCanvas(){
  const canvas=document.getElementById('bgCanvas');
  const ctx=canvas.getContext('2d');
  let W,H;
  function resize(){W=canvas.width=window.innerWidth;H=canvas.height=window.innerHeight;}
  resize();
  window.addEventListener('resize',resize);

  const pts=Array.from({length:35},()=>({
    x:Math.random()*1200,y:Math.random()*900,
    vx:(Math.random()-.5)*.3,vy:(Math.random()-.5)*.15,
    sz:Math.random()*1.8+.4,op:Math.random()*.35+.08,
    col:Math.random()<.5?'0,255,136':'212,168,67',
    ph:Math.random()*Math.PI*2
  }));
  const syms=[
    ...Array(4).fill(null).map((_,i)=>({sym:'♦♣♥♠'[i],x:Math.random()*1400,y:Math.random()*900,vx:(Math.random()-.5)*.18,vy:-.1-Math.random()*.12,sz:Math.random()*16+7,op:Math.random()*.055+.015,isRed:i===0||i===2,rot:Math.random()*360,vrot:(Math.random()-.5)*.25}))
  ];

  function draw(){
    ctx.clearRect(0,0,W,H);
    pts.forEach(p=>{
      p.x=(p.x+p.vx+W)%W;p.y=(p.y+p.vy+H)%H;p.ph+=.018;
      ctx.beginPath();ctx.arc(p.x,p.y,p.sz,0,Math.PI*2);
      ctx.fillStyle=`rgba(${p.col},${p.op*(0.7+.3*Math.sin(p.ph))})`;ctx.fill();
    });
    syms.forEach(s=>{
      s.x=(s.x+s.vx+W)%W;s.y=(s.y+s.vy+H)%H;s.rot+=s.vrot;
      ctx.save();ctx.translate(s.x,s.y);ctx.rotate(s.rot*Math.PI/180);
      ctx.font=`${s.sz}px serif`;
      ctx.fillStyle=s.isRed?`rgba(224,48,64,${s.op})`:`rgba(180,200,255,${s.op*.6})`;
      ctx.fillText(s.sym,-s.sz/2,-s.sz/4);ctx.restore();
    });
    requestAnimationFrame(draw);
  }
  draw();
}

// ══ CARD DRAG REORDER ══
let dragSrcIdx=null;
let dragClickThreshold=false;

function handleCardDragStart(e,idx){
  dragSrcIdx=idx;
  dragClickThreshold=true;
  e.dataTransfer.effectAllowed='move';
  e.dataTransfer.setData('text/plain',String(idx));
  setTimeout(()=>{
    const el=e.target.closest('.card');
    if(el)el.classList.add('dragging');
  },0);
  const inner=document.getElementById('handInner');
  if(inner)inner.classList.add('drag-active');
}

function handleCardDragOver(e,idx){
  e.preventDefault();
  e.dataTransfer.dropEffect='move';
  // Highlight target
  document.querySelectorAll('#handInner .card').forEach(el=>{
    el.classList.remove('drag-over');
  });
  if(dragSrcIdx!==null&&dragSrcIdx!==idx){
    e.target.closest('.card')?.classList.add('drag-over');
  }
}

function handleCardDrop(e,toIdx){
  e.preventDefault();
  if(dragSrcIdx===null||dragSrcIdx===toIdx)return;
  if(!G)return;
  const ms=G.mySlot;
  const hand=G.hands[ms];

  // Save selected card ids before reorder
  const selIds=new Set((G.selected||[]).map(i=>hand[i]?hand[i].id:null).filter(Boolean));

  // Reorder hand
  const moved=hand.splice(dragSrcIdx,1)[0];
  hand.splice(toIdx,0,moved);

  // Remap selected indices based on card identity
  G.selected=hand.reduce((acc,c,i)=>{if(selIds.has(c.id))acc.push(i);return acc;},[]);

  dragSrcIdx=null;
  const isMyTurn=G.current===ms&&G.phase!=='end';
  document.getElementById('handInner').innerHTML=
    hand.map((c,i)=>mkCardHTML(c,i,isMyTurn,G.selected.includes(i))).join('');
  if(isMyTurn)updateComboHint();
}

function handleCardDragEnd(e){
  dragSrcIdx=null;
  document.querySelectorAll('#handInner .card').forEach(el=>{
    el.classList.remove('dragging','drag-over');
  });
  const inner=document.getElementById('handInner');
  if(inner)inner.classList.remove('drag-active');
}

// ══ DRAG SCROLL (only when not dragging a card) ══
(function(){
  let drag=false,sx=0,ss=0;
  const w=document.getElementById('handWrap');
  w.addEventListener('mousedown',e=>{
    if(e.target.closest('.card'))return; // let card handle its own drag
    drag=true;sx=e.pageX;ss=w.scrollLeft;w.style.cursor='grabbing';
  });
  document.addEventListener('mousemove',e=>{if(drag)w.scrollLeft=ss-(e.pageX-sx);});
  document.addEventListener('mouseup',()=>{drag=false;w.style.cursor='grab';});
  w.addEventListener('touchstart',e=>{if(e.target.closest('.card'))return;sx=e.touches[0].pageX;ss=w.scrollLeft;},{passive:true});
  w.addEventListener('touchmove',e=>{w.scrollLeft=ss-(e.touches[0].pageX-sx);},{passive:true});
})();

document.getElementById('joinCode').addEventListener('input',function(){this.value=this.value.toUpperCase();});
</script>
